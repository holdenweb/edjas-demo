<!doctype html>
<meta charset="utf-8">
<title>EDJAS dataflow</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { color-scheme: light dark; }
  body {
    max-width: 56rem;
    margin: 2rem auto;
    padding: 0 1.25rem;
    font: 16px/1.7 -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  h1, h2, h3 { font-weight: 500; line-height: 1.3; }
  hr { border: none; border-top: 1px solid #8884; margin: 2rem 0; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; }
  pre.mermaid { text-align: center; margin: 1.5rem 0; }
  blockquote { margin: 1rem 0; padding: 0 1rem; border-left: 3px solid #8886; color: #8888; }
  #err { color: #b00; white-space: pre-wrap; }
</style>
<article id="content">Loading <code>dataflow.md</code>…</article>
<p id="err"></p>

<script type="module">
import { marked } from "https://cdn.jsdelivr.net/npm/marked@12/lib/marked.esm.js";
import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

const content = document.getElementById("content");
const err = document.getElementById("err");

try {
  const md = await (await fetch("dataflow.md", { cache: "no-store" })).text();

  // Pull the ```mermaid fences out before Markdown rendering so their raw text
  // (with <br/>, <b> …) survives as element textContent for Mermaid to read.
  const blocks = [];
  const staged = md.replace(/```mermaid\r?\n([\s\S]*?)```/g, (_, code) => {
    blocks.push(code);
    return `\n\nMERMAID_PLACEHOLDER_${blocks.length - 1}\n\n`;
  });

  content.innerHTML = marked.parse(staged);

  content.querySelectorAll("p").forEach((p) => {
    const m = p.textContent.trim().match(/^MERMAID_PLACEHOLDER_(\d+)$/);
    if (!m) return;
    const pre = document.createElement("pre");
    pre.className = "mermaid";
    pre.textContent = blocks[m[1]];      // textContent, NOT innerHTML — keeps the tags literal
    p.replaceWith(pre);
  });

  const dark = matchMedia("(prefers-color-scheme: dark)").matches;
  mermaid.initialize({ startOnLoad: false, securityLevel: "loose", theme: dark ? "dark" : "neutral" });
  await mermaid.run({ querySelector: "pre.mermaid" });
} catch (e) {
  err.textContent =
    "Could not load dataflow.md. Open this page over HTTP, not file://:\n\n" +
    "  cd " + location.pathname.replace(/dataflow\.html$/, "") + "\n" +
    "  python3 -m http.server 8000\n\n" +
    "then open http://localhost:8000/dataflow.html\n\n(" + e + ")";
}
</script>
